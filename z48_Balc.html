<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z48 Balcerzak</title>
</head>
<body>

<div style="color:red; font-size:30px;">
<script>
    let suma_bal = 0;

    for (let i_bal = 1; i_bal <= 1000000; i_bal++) {
        suma_bal = suma_bal + 1 / i_bal;
    }

    document.write("Suma szeregu harmonicznego od 1 do 1000000 wynosi: " + suma_bal);
</script>
</div>

</body>
</html>
<!-- Balcerzak Z48_JS -->
