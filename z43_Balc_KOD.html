<script>
    let koniec_petli_bal = prompt("Podaj liczbę końcową:");
    koniec_petli_bal = parseInt(koniec_petli_bal;);

    for (let i_b = 2; i_b <= koniec_petli_bal; i_b++) {
        if (i_b % 2 == 0) {
            document.write(i_b + "<br>");
        }
    }
</script>
