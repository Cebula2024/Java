<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z49 Balcerzak</title>
</head>
<body>

<div style="color:red; font-size:30px;">
<script>
    let n_bal = prompt("Podaj liczbę n:");
    n_bal = parseInt(n_bal);

    let silnia_bal = 1;

    for (let i_bal = 1; i_bal <= n_bal; i_bal++) {
        silnia_bal = silnia_bal * i_bal;
    }

    document.write("n = " + n_bal + "<br>");
    document.write(n_bal + "! = " + silnia_bal);
</script>
</div>

</body>
