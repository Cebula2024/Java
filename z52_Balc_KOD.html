<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z52 Balcerzak</title>
</head>
<body>

<script>
    let a_bal = (9 % 4) + 5;
    let b_bal = (5 % 6) + 20;

    for (let i_bal = 1; i_bal <= a_bal; i_bal {
        for (let j_bal 1; j_bal <= b_bal; j_bal++) {
            if (i_bal == 1 || i_bal == a_bal || j_bal == 1 || j_bal == b_bal) {
                document.write("*");
            } else {
                document.write("&nbsp;&nbsp;");
            }
        }
        document.write("<br>");
    }
</script>

</body>
