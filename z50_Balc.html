<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z50 Balcerzak</title>
</head>
<body>

<div style="color:red; font-size:2cm;">
<script>
    for (let i_bal = 1; i_bal <= 10; i_bal++) {
        for (let j_bal = 1; j_bal <= i_bal; j_bal++) {
            document.write("&nbsp;");
        }
        document.write(i_bal + "<br>");
    }
</script>
</div>

</body>
</html>
