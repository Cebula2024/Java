<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z57 Balcerzak</title>
</head>
<body>

<script>
    for (let i_bal = 15; i_bal <= 25; i_bal++) {
        let pierw2_bal = Math.sqrt(i_bal);
        let pierw4_bal = Math.sqrt(pierw2_bal);

        document.write(
            "i = " + i_bal +
            "&nbsp;&nbsp;&nbsp; pierw_2(" + i_bal + ") = " + pierw2_bal.toFixed(2) +
            "&nbsp;&nbsp;&nbsp; pierw_4(" + i_bal + ") = " + pierw4_bal.toFixed(2) +
            "<br>"
        );
    }
</script>
