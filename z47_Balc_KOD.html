<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>z47 Balcerzak</title>
</head>
<body>

<div style="color:red; font-size:40px;">
<script>
    let a_bal;
    let b_bal;
    let c_bal;

    do {
        a_bal = prompt("Podaj bok a trójkąta:");
        a_bal = parseFloat(a_bal);
    } while (a_bal <= 0);

    do {
        b_bal = prompt("Podaj bok b trójkąta:");
        b_bal = parseFloat(b_bal);
    } while (b_bal <= 0);

    do {
        c_bal = prompt("Podaj bok c trójkąta:");
        c_bal = parseFloat(c_bal);
    } while (c_bal <= 0);

    if (
        a_bal + b_bal > c_bal &&
        a_bal + c_bal > b_bal &&
        b_bal + c_bal > a_bal
    ) {
        document.write("Z podanych boków można zbudować trójkąt.");
    } else {
        document.write("Z podanych boków nie można zbudować trójkąta.");
    }
</script>
</div>

</body>
</html>
