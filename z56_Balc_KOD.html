<script>
    for (let i_bal = 0; i_bal <= 39; i_bal++) {
        let w_bal = i_bal * i_bal + i_bal + 41;

        document.write("i = " + i_bal + "&nbsp;&nbsp;&nbsp; w(" + i_bal + ") = " + w_bal + "<br>");

        if ((i_bal + 1) % 5 == 0) {
            document.write("<br>");
        }
    }
</script>
